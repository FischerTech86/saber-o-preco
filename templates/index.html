<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTIMO - Busca e Comparação</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #0a0f1d; font-family: 'Segoe UI', sans-serif; color: white; }
        .box { background: #16213e; padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin-bottom: 20px; letter-spacing: 2px; }
        form { display: flex; flex-direction: column; gap: 15px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: none; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 15px; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; color: white; transition: 0.3s; }
        .btn-busca { background: #34A853; }
        .btn-comp { background: #4285F4; }
        .resultado-box { margin-top: 20px; padding: 15px; background: #1a2a44; border-radius: 10px; font-size: 14px; line-height: 1.5; color: #ddd; }
    </style>
</head>
<body>
    <div class="box">
        <h1>OPTIMO</h1>
        
        <form method="POST">
            <input type="text" name="produto" placeholder="O que você procura?" required>
            <button type="submit" class="btn-busca">BUSCAR NO SHOPPING</button>
        </form>

        <hr style="margin: 30px 0; border: 0; border-top: 1px solid #30475e;">

        <form method="POST">
            <input type="text" name="p1" placeholder="Produto 1..." required>
            <input type="text" name="p2" placeholder="Produto 2..." required>
            <button type="submit" class="btn-comp">VERIFICAR MELHOR</button>
        </form>

        {% if comparacao %}
            <div class="resultado-box">{{ comparacao }}</div>
        {% endif %}
    </div>
</body>
</html>
