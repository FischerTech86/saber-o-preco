<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%), 
                        radial-gradient(circle at 80% 80%, #1e40af, transparent 40%), 
                        #000; 
            color: #fff; font-family: sans-serif; padding: 40px; margin: 0; min-height: 100vh; 
        }
        .nav-menu { text-align: center; margin-bottom: 30px; }
        .nav-menu a { color: #60a5fa; margin: 0 10px; text-decoration: none; font-weight: bold; }
        .animated-title { font-size: 3.5rem; text-align: center; color: #fff; text-shadow: 0 0 20px #60a5fa; margin-bottom: 20px; }
        
        /* Estilo dos Blocos (Cards) */
        .results-container { max-width: 800px; margin: 0 auto; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 25px; margin: 20px 0; border-radius: 15px; border: 1px solid #60a5fa; }
        
        form { text-align: center; margin-bottom: 40px; }
        input { padding: 15px; width: 60%; border-radius: 50px; border: 1px solid #60a5fa; background: rgba(0,0,0,0.3); color: white; text-align: center; }
        button { padding: 15px 30px; background: #60a5fa; border: none; border-radius: 50px; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="/">Início</a>
        <a href="/dicas">Dicas</a>
        <a href="/politica">Política</a>
        <a href="/sobre">Sobre</a>
    </nav>

    <h1 class="animated-title">Optimo</h1>
    
    <form action="/" method="GET">
        <input type="text" name="pesquisa" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    <div class="results-container">
        {% if lista %}
            {% for item in lista %}
                <div class="card">
                    <h3>{{ item.nome }}</h3>
                    <p><strong>Diferencial:</strong> {{ item.dif }}</p>
                    <a href="{{ item.link }}" style="color:#60a5fa; text-decoration: none; font-weight: bold;" target="_blank">Ver no Google Shopping →</a>
                </div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
