{% if mercados %}
    <div class="secao">
        <div class="titulo-secao">Mercados</div>
        <div class="grid-botoes">
            {% for m in mercados %}
                <a href="{{ m.link }}" target="_blank" class="botao">{{ m.nome }}</a>
            {% endfor %}
        </div>
    </div>
{% endif %}

{% if lojas %}
    <div class="secao">
        <div class="titulo-secao">Lojas Gerais</div>
        <div class="grid-botoes">
            {% for l in lojas %}
                <a href="{{ l.link }}" target="_blank" class="botao">{{ l.nome }}</a>
            {% endfor %}
        </div>
    </div>
{% endif %}
