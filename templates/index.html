<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-color: #0a192f; color: white; font-family: sans-serif; }
        .menu { margin: 20px; text-align: center; }
        .menu a { color: #60a5fa; margin: 0 10px; text-decoration: none; }
        .box-central { background: #112240; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>

    <nav class="menu">
        <a href="/">Início</a>
        <a href="/sobre">Sobre</a>
        <a href="/dicas">Dicas</a>
        <a href="/politica-privacidade">Privacidade</a>
    </nav>

    <div class="box-central">
        <h1>OPTIMO</h1>
        <form action="/resultado" method="POST">
            <input type="text" name="p1" placeholder="Produto A..." required>
            <input type="text" name="p2" placeholder="Produto B..." required>
            <button type="submit">COMPARAR</button>
        </form>

        {% if resultado %}
        <div style="margin-top: 20px;">{{ resultado }}</div>
        {% endif %}
    </div>

</body>
</html>
