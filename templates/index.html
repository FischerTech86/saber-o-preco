<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Optimo - Sistema Completo</title>
    <style>
        body { 
            margin: 0; 
            background: radial-gradient(circle at top, #1a2a6c, #000000); 
            background-attachment: fixed; 
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
        }

        /* Animação para o título */
        @keyframes neonPulse {
            0% { text-shadow: 0 0 5px #00d4ff, 0 0 10px #00d4ff; opacity: 0.8; }
            50% { text-shadow: 0 0 20px #00d4ff, 0 0 30px #00d4ff; opacity: 1; }
            100% { text-shadow: 0 0 5px #00d4ff, 0 0 10px #00d4ff; opacity: 0.8; }
        }

        .titulo-optimo {
            font-size: 4rem;
            margin-bottom: 20px;
            color: #fff;
            animation: neonPulse 2s infinite;
            letter-spacing: 5px;
        }

        .search-container { width: 80%; max-width: 800px; margin-top: 150px; text-align: center; }
        
        input { 
            width: 100%; padding: 20px; border-radius: 50px; 
            border: 2px solid #00d4ff; background: rgba(0, 0, 0, 0.6); 
            color: white; outline: none; text-align: center; font-size: 1.1rem; box-sizing: border-box;
        }

        #results { display: none; width: 80%; max-width: 600px; margin-top: 40px; }
        .card { 
            background: rgba(255, 255, 255, 0.05); border: 1px solid #333; 
            padding: 25px; margin-bottom: 20px; border-radius: 15px; 
            display: flex; justify-content: space-between; align-items: center; 
            text-decoration: none; color: white; transition: 0.3s; 
        }
        .card:hover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.1); }

        #ai-btn { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #00d4ff; color: black; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #ai-modal { display: none; position: fixed; bottom: 80px; right: 20px; width: 320px; background: #111; border: 1px solid #00d4ff; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="search-container" id="searchBar">
        <!-- Título Animado -->
        <h1 class="titulo-optimo">OPTIMO</h1>
        
        <input type="text" id="userInput" placeholder="O que você está procurando?" onkeydown="verificarEnter(event)">
    </div>

    <div id="results">
        <a id="linkBaixo" href="#" target="_blank" class="card"><h3>Preço Baixo</h3></a>
        <a id="linkAlto" href="#" target="_blank" class="card"><h3>Preço Alto</h3></a>
    </div>

    <div id="ai-btn" onclick="toggleIA()">IA Optimo</div>
    <div id="ai-modal">
        <input type="text" id="aiInput" placeholder="Pergunte algo..." onkeydown="perguntarIA(event)" style="width: 90%; margin-bottom: 10px; padding: 10px; border-radius: 10px; border: none;">
        <div id="ai-resp" style="font-size:0.9rem; color: #fff;">IA Optimo: Olá! Como posso te ajudar?</div>
    </div>

    <script>
        const baseConhecimento = {
            "arroz": ["IA Optimo: O arroz branco é o clássico, mas se quer economia, compare as marcas nas promoções de atacado!", "IA Optimo: O arroz integral é uma escolha mais nutritiva para o dia a dia."],
            "feijão": ["IA Optimo: O feijão carioca é o rei das mesas, fácil de achar e com ótimo preço.", "IA Optimo: Dica: deixe o feijão de molho antes de cozinhar para economizar gás!"],
            "farofa": ["IA Optimo: Farofa combina com quase tudo! Procure pelas versões crocantes.", "IA Optimo: Fazer sua própria farofa com manteiga e temperos frescos sempre sai mais barato."],
            "oi": ["IA Optimo: Olá! Tudo bem? Como posso te ajudar hoje?", "IA Optimo: Oi! Estou aqui pronta para analisar o mercado para você."],
            "padrao": ["IA Optimo: Essa é uma excelente pergunta! Recomendo conferir as variações de preço no Google Shopping para garantir a melhor economia."]
        };

        function verificarEnter(event) {
            if (event.key === 'Enter') {
                const termo = document.getElementById('userInput').value;
                document.getElementById('linkBaixo').href = `https://www.google.com/search?q=${encodeURIComponent(termo)}&tbm=shop&tbs=p_ord:p,mr:1`;
                document.getElementById('linkAlto').href = `https://www.google.com/search?udm=28&q=${encodeURIComponent(termo)}&shoprs=CAEYFyoPZ29vZ2xlIHNob3BwaW5nMikIFxIdUHJlw6dvOiBkbyBtYWlvciBwYXJhIG8gbWVub3IqBBABGAFQAmACiAEC`;
                document.getElementById('results').style.display = 'block';
            }
        }

        function perguntarIA(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('aiInput').value.toLowerCase();
                const resp = document.getElementById('ai-resp');
                let encontrado = false;
                for (let chave in baseConhecimento) {
                    if (input.includes(chave) && chave !== "padrao") {
                        const lista = baseConhecimento[chave];
                        resp.innerText = lista[Math.floor(Math.random() * lista.length)];
                        encontrado = true;
                        break;
                    }
                }
                if (!encontrado) resp.innerText = baseConhecimento["padrao"][0];
            }
        }

        function toggleIA() {
            const modal = document.getElementById('ai-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }
    </script>
</body>
</html>
