<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background-image: radial-gradient(circle at top right, #001f3f, #000);
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }

        .search-form { 
            background: #111; padding: 10px 20px; border-radius: 50px; 
            border: 1px solid #333; display: flex; width: 400px; margin-bottom: 60px; 
        }
        input { background: transparent; border: none; color: white; width: 100%; padding: 10px; outline: none; }
        button { background: #007bff; border: none; padding: 10px 20px; border-radius: 50px; color: white; cursor: pointer; }

        /* Estilo da Ferramenta de Comparação (Landing Page) */
        .comparison-container { 
            background: rgba(255, 255, 255, 0.05); padding: 40px; 
            border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center; width: 400px;
        }
        .comparison-form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .comparison-form input { border: 1px solid #333; border-radius: 10px; }

        /* Grid de Resultados */
        .results-grid { display: flex; gap: 30px; justify-content: center; width: 90%; max-width: 1000px; }
        .card { 
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 20px; width: 300px; 
        }
        .badge { display: inline-block; background: rgba(0, 123, 255, 0.2); color: #60a5fa; padding: 4px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; margin-bottom: 20px; }
        .specs-table { margin-bottom: 25px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .spec-row { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.85rem; }
        .btn-ofertas { display: block; text-align: center; padding: 12px; background: #007bff; color: #fff; text-decoration: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <header><h1>Optimo</h1></header>

    <!-- Barra de busca sempre visível -->
    <form method="POST" class="search-form">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if not termo %}
    <!-- Esta parte SÓ aparece quando não há pesquisa -->
    <div class="comparison-container">
        <h2>Comparar Produtos</h2>
        <p style="color:#888; font-size: 0.9rem;">Insira dois produtos para comparar agora:</p>
        <form method="POST" class="comparison-form">
            <input type="text" name="prod_a" placeholder="Produto A" required>
            <input type="text" name="prod_b" placeholder="Produto B" required>
            <button type="submit">Comparar Produtos</button>
        </form>
    </div>
    {% else %}
    <!-- Esta parte SÓ aparece após a pesquisa -->
    <div class="results-grid">
        <div class="card">
            <h3>Resultado para: {{ termo }}</h3>
            <span class="badge">Análise</span>
            <div class="specs-table">
                <div class="spec-row"><span class="spec-label">Status:</span> <span class="spec-value">Encontrado</span></div>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" class="btn-ofertas">Ver Ofertas</a>
        </div>
    </div>
    {% endif %}

</body>
</html>
