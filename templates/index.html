<!DOCTYPE html>
<html>
<head>
    <title>Minha Busca</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #000; color: #fff; }
        .container { max-width: 600px; margin: auto; }
        .card-produto { background: #1a1a1a; padding: 20px; margin-top: 20px; border-radius: 10px; }
        .btn-link { display: inline-block; background: #60a5fa; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>O que você procura?</h1>
        <form action="/" method="GET">
            <input type="text" name="pesquisa" placeholder="Digite o produto..." required style="padding: 10px; width: 70%;">
            <button type="submit" style="padding: 10px;">Buscar</button>
        </form>

        {% if lista %}
            <h2>Resultados para: {{ termo }}</h2>
            {% for item in lista %}
                <div class="card-produto">
                    <h3>{{ item.nome }}</h3>
                    <p><strong>Preço:</strong> {{ item.preco }}</p>
                    <p><strong>Diferencial:</strong> {{ item.dif }}</p>
                    <a href="{{ item.link }}" target="_blank" class="btn-link">Ver no Google Shopping</a>
                </div>
            {% endfor %}
        {% elif termo %}
            <p>Nenhum resultado encontrado para "{{ termo }}".</p>
        {% endif %}
    </div>
</body>
</html>
