<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; }
        .secao { margin: 20px auto; max-width: 400px; background: white; padding: 15px; border-radius: 8px; }
        .botao { display: block; padding: 10px; margin: 5px 0; background: #2c3e50; color: white; text-decoration: none; border-radius: 5px; }
        input { padding: 10px; width: 200px; }
    </style>
</head>
<body>
    <h1>Optimo</h1>
    <form method="POST">
        <input type="text" name="produto" placeholder="Buscar..." value="{{ termo }}" required>
        <button type="submit">Buscar</button>
    </form>

    {% if mercados %}
    <div class="secao">
        <h3>Mercados</h3>
        {% for m in mercados %} <a href="{{ m.link }}" target="_blank" class="botao">{{ m.nome }}</a> {% endfor %}
    </div>
    {% endif %}

    {% if lojas %}
    <div class="secao">
        <h3>Lojas Gerais</h3>
        {% for l in lojas %} <a href="{{ l.link }}" target="_blank" class="botao">{{ l.nome }}</a> {% endfor %}
    </div>
    {% endif %}
</body>
</html>
