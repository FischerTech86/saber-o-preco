<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        /* Reset para garantir alinhamento perfeito */
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            background: #0a0f1d; font-family: sans-serif;
        }

        .box { 
            background: #16213e; padding: 40px; border-radius: 10px; 
            width: 400px; text-align: center;
        }

        h1 { color: white; margin-bottom: 20px; }

        /* Barra de pesquisa reta e alinhada */
        form { width: 100%; display: flex; flex-direction: column; gap: 15px; }
        
        input { 
            width: 100%; padding: 15px; border-radius: 5px; border: none; 
            outline: none; font-size: 16px;
        }

        button { 
            width: 100%; padding: 15px; background: #34A853; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-weight: bold;
        }

        button:hover { background: #2d8a46; }
    </style>
</head>
<body>
    <div class="box">
        <h1>OPTIMO</h1>
        <form method="POST">
            <input type="text" name="produto" placeholder="Digite o produto..." required>
            <button type="submit">BUSCAR</button>
        </form>

        {% if query %}
            <h2 style="color: white; margin-top: 30px;">Resultados para: {{ query }}</h2>
            <a href="https://www.google.com/search?q={{ query }}" target="_blank" style="color: #4285F4;">Ver no Google</a>
        {% endif %}
    </div>
</body>
</html>
