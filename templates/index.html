<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; color: #3b82f6; text-shadow: 0 0 20px #3b82f6; }
        
        .search-container { background: #111; padding: 10px; border-radius: 50px; border: 1px solid #333; display: flex; width: 90%; max-width: 500px; margin-top: 20px; }
        input { background: transparent; border: none; color: white; padding: 10px 20px; width: 100%; outline: none; }
        button { background: #3b82f6; border: none; padding: 10px 25px; border-radius: 50px; color: white; cursor: pointer; }

        .results { width: 90%; max-width: 500px; margin-top: 40px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        
        /* Estilo da seção de Dicas e Política */
        .info-box { background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-top: 30px; width: 90%; max-width: 500px; }
        .info-box h3 { color: #3b82f6; margin-top: 0; }
        ul { padding-left: 20px; }
    </style>
</head>
<body>

    <header>
        <h1>Optimo</h1>
    </header>

    <form method="POST" class="search-container">
        <input type="text" name="query" placeholder="O que procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="results">
        <div class="card">
            <h3>Resultados para: {{ termo }}</h3>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank">Ver no Google Shopping</a>
        </div>
    </div>
    {% endif %}

    <div class="info-box">
        <h3>💡 Dicas</h3>
        <ul>
            {% for dica in info.dicas %}
                <li>{{ dica }}</li>
            {% endfor %}
        </ul>
        
        <h3>🛡️ Política</h3>
        <p>{{ info.politica }}</p>
    </div>

</body>
</html>
