<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body {
            background: radial-gradient(circle at 50% 10%, #1e3a8a, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Ajustei o topo do header para subir o conjunto todo */
        header { margin-top: 40px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }

        .search-container {
            background: rgba(255, 255, 255, 0.08);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            width: 90%;
            max-width: 600px;
        }
        input { background: transparent; border: none; color: white; padding: 15px 25px; width: 100%; outline: none; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* AQUI ESTÁ A MUDANÇA: O margin-top agora é 20px (estava 50px) */
        .results-area { 
            width: 90%; 
            max-width: 600px; 
            margin-top: 20px; 
        }
        
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 25px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-link { 
            display: inline-block; margin-top: 15px; color: #60a5fa; text-decoration: none; font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <h1>Optimo</h1>
    </header>

    <form method="POST" class="search-container">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    <div class="results-area">
        {% if request.method == 'POST' %}
            {% if resultado %}
                <div class="card">
                    <h3>{{ resultado.titulo }}</h3>
                    <p>{{ resultado.desc }}</p>
                    <a href="{{ resultado.link }}" target="_blank" class="btn-link">Ver no Google Shopping →</a>
                </div>
            {% else %}
                <p>Nenhum produto encontrado para "{{ termo }}".</p>
            {% endif %}
        {% endif %}
    </div>

</body>
</html>
