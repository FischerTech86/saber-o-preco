<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Optimo - IA de Compras</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background-color: #05080f; color: white; text-align: center; margin: 0; padding: 0; }
        .header-bar { background-color: #1a2332; padding: 20px 0; border-bottom: 2px solid #1e3a8a; display: flex; justify-content: center; align-items: center; gap: 15px; }
        .site-logo { width: 50px; height: 50px; }
        .optimo-title { font-size: 50px; font-weight: bold; text-transform: uppercase; background: linear-gradient(to right, #4285F4, #EA4335, #FBBC05, #34A853); -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: googleGradient 4s linear infinite; background-size: 200% auto; }
        @keyframes googleGradient { to { background-position: 200% center; } }
        .container { display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .ia-box { background: #111d35; border: 2px solid #1e3a8a; border-radius: 20px; padding: 30px; margin-bottom: 20px; width: 90%; max-width: 600px; }
        .btn-green { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn-loja { display: inline-block; padding: 8px 15px; margin: 5px; background: #1e40af; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="header-bar">
        <img src="{{ url_for('static', filename='logo.png') }}" class="site-logo" alt="Logo">
        <div class="optimo-title">Optimo</div>
    </div>
    <div class="container">
        <div class="ia-box">
            <h3>IA Optimo</h3>
            <form method="POST">
                <input type="text" name="pergunta_ia" placeholder="Pergunte algo...">
                <button type="submit" class="btn-green">Enviar</button>
            </form>
        </div>
        {% for nome, lista in [('Mercados', mercados), ('Lojas Gerais', lojas), ('Carros', carros), ('Relógios', relogios)] %}
        <div class="ia-box">
            <h3>{{ nome }}</h3>
            {% for item in lista %}<a href="{{ item.link }}" target="_blank" class="btn-loja">{{ item.nome }}</a>{% endfor %}
        </div>
        {% endfor %}
    </div>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1159494586085153" crossorigin="anonymous"></script>
</body>
</html>
