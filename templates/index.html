<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1159494586085153" crossorigin="anonymous"></script>
    <title>Optimo - IA de Compras</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 0;
            background-image: url('https://i.imgur.com/example_image.jpg'); /* Substitua pelo link da imagem gerada */
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white;
        }
        .container {
            padding-top: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .ia-box { 
            background: rgba(10, 30, 60, 0.85); 
            border: 2px solid #007bff; 
            border-radius: 15px; 
            padding: 25px; 
            width: 90%; 
            max-width: 450px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
        .botao { 
            display: inline-block; 
            padding: 10px 20px; 
            margin: 5px; 
            background: #28a745; 
            color: white; 
            text-decoration: none; 
            border-radius: 5px; 
            font-weight: bold; 
        }
        input { padding: 10px; width: 60%; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background: #28a745; color: white; border: none; border-radius: 5px; cursor: pointer; }
        .logo-credito { position: fixed; bottom: 20px; right: 20px; width: 60px; opacity: 0.8; }
    </style>
</head>
<body>

<div class="container">
    <h1>Optimo</h1>
    
    <div class="ia-box">
        <h3>IA Optimo</h3>
        <p>{{ resposta_ia }}</p>
        <form method="POST">
            <input type="hidden" name="produto" value="{{ produto }}">
            <input type="text" name="pergunta_ia" placeholder="Pergunte algo à IA...">
            <button type="submit">Enviar</button>
        </form>
    </div>

    <div class="ia-box">
        <form method="POST">
            <input type="text" name="produto" placeholder="Buscar produto..." value="{{ produto }}">
            <button type="submit">Buscar</button>
        </form>
    </div>

    {% if mercados %}<div class="ia-box"><h3>Mercados</h3>{% for m in mercados %}<a href="{{ m.link }}" target="_blank" class="botao">{{ m.nome }}</a>{% endfor %}</div>{% endif %}
    {% if lojas %}<div class="ia-box"><h3>Lojas Gerais</h3>{% for l in lojas %}<a href="{{ l.link }}" target="_blank" class="botao">{{ l.nome }}</a>{% endfor %}</div>{% endif %}
</div>

<img src="https://i.imgur.com/seu_simbolo.png" class="logo-credito" alt="Crédito">

</body>
</html>
