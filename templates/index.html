<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        /* Fundo escuro com a luz azul radial */
        body {
            background: radial-gradient(circle at 50% 0%, #1e3a8a, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container { text-align: center; width: 100%; max-width: 600px; padding: 20px; }
        h1 { font-size: 3rem; margin-bottom: 30px; letter-spacing: -1px; }
        
        /* A barra de pesquisa */
        .search-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            display: flex;
            align-items: center;
        }
        input {
            background: transparent;
            border: none;
            color: white;
            padding: 15px;
            width: 100%;
            font-size: 1.1rem;
            outline: none;
        }
        button {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Optimo</h1>
        
        <form action="https://www.google.com/search" method="GET" class="search-container">
            <input type="hidden" name="tbm" value="shop">
            
            <input type="text" name="q" placeholder="O que você procura?" required>
            <button type="submit">Buscar</button>
        </form>
    </div>
</body>
</html>
