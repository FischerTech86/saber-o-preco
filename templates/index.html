<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO - Comparador</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background-color: #112240; padding: 20px; display: inline-block; border-radius: 10px; }
        input { padding: 10px; margin: 5px; width: 250px; }
        button { padding: 10px 20px; background-color: #60a5fa; border: none; cursor: pointer; color: white; }
    </style>
</head>
<body>
    <h1>OPTIMO - Comparador</h1>
    <div class="box">
        <form action="/resultado" method="GET">
            <input type="text" name="produto1" placeholder="Produto 1" required><br>
            <input type="text" name="produto2" placeholder="Produto 2" required><br>
            <button type="submit">COMPARAR PRODUTOS</button>
        </form>
    </div>
</body>
</html>
