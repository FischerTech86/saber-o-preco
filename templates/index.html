<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO - Busca Shopping</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .box-central { background: #112240; padding: 40px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
        input { padding: 10px; width: 80%; margin-bottom: 10px; border-radius: 5px; border: none; }
        button { padding: 10px 20px; background-color: #60a5fa; border: none; color: white; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="box-central">
        <h1>OPTIMO</h1>
        <p>Digite o produto que deseja comparar no Google Shopping:</p>
        
        <form action="https://www.google.com/search" method="GET" target="_blank">
            <input type="text" name="q" placeholder="Ex: Arroz, Celular, Tênis..." required>
            <input type="hidden" name="tbm" value="shop">
            <button type="submit">BUSCAR NO SHOPPING</button>
        </form>
    </div>

</body>
</html>
