<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body { background: #0a111a; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 20px; border-radius: 10px; border: 2px solid; }
        .card-a { border-color: #ff4d4d; background: #1a0a0a; }
        .card-b { border-color: #4d94ff; background: #0a0a1a; }
        input { width: 90%; padding: 12px; margin-bottom: 10px; border-radius: 5px; background: #111; border: 1px solid #333; color: white; }
        button { width: 100%; padding: 15px; background: #60a5fa; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: auto;">
        <h1>Optimo Comparador</h1>
        <form method="POST">
            <div class="grid">
                <input type="text" name="prodA" placeholder="Produto A (Ex: Notebook Dell)" required>
                <input type="text" name="prodB" placeholder="Produto B (Ex: Macbook Pro)" required>
            </div>
            <button type="submit">Comparar Qualquer Produto</button>
        </form>

        {% if dados_a %}
        <div class="grid">
            <div class="card card-a">
                <h3>{{ nome_a }}</h3>
                <ul>{% for key, val in dados_a.items() %}<li><b>{{key}}:</b> {{val}}</li>{% endfor %}</ul>
            </div>
            <div class="card card-b">
                <h3>{{ nome_b }}</h3>
                <ul>{% for key, val in dados_b.items() %}<li><b>{{key}}:</b> {{val}}</li>{% endfor %}</ul>
            </div>
        </div>
        <div style="margin-top:20px; padding:20px; background:#161b22; border-left: 5px solid #60a5fa;">
            <h3>Análise Inteligente</h3>
            <p>{{ analise }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
