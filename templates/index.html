<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a2a6c, #000000);
            background-attachment: fixed;
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .search-container {
            width: 80%;
            max-width: 800px;
            margin-top: 150px; /* Ajustado para centralizar quando só tem a busca */
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #00d4ff;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
        }

        /* Escondido por padrão */
        #results {
            display: none;
            width: 80%;
            max-width: 600px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <!-- O evento oninput faz aparecer assim que você começa a digitar -->
        <input type="text" placeholder="O que você está procurando?" oninput="mostrarResultados()">
    </div>

    <div id="results">
        <div class="card"><h3>Plano Iniciante</h3><div class="price-tag">R$ 10,00</div></div>
        <div class="card"><h3>Plano Econômico</h3><div class="price-tag">R$ 29,90</div></div>
        <div class="card"><h3>Plano Premium</h3><div class="price-tag">R$ 59,90</div></div>
    </div>

    <script>
        function mostrarResultados() {
            document.getElementById('results').style.display = 'block';
        }
    </script>

</body>
</html>
