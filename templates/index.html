<!DOCTYPE html>
<html>
<body>
    <h1>Saber o Preço 🔍</h1>
    <form action="/" method="POST">
        <input type="text" name="produto" placeholder="Digite o produto..." required>
        <button type="submit">Buscar</button>
    </form>
    
    <hr>
    
    {% if produto %}
        <p><strong>Resultados para:</strong> {{ produto }}</p>
        <a href="{{ link }}" target="_blank" style="font-size: 20px; font-weight: bold;">Clique aqui para ver os preços no Mercado Livre</a>
    {% endif %}
</body>
</html>
