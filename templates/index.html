<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { background: #0a0f1d; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .box { background: #16213e; padding: 30px; border-radius: 15px; width: 100%; max-width: 400px; text-align: center; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #34A853; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h1>OPTIMO</h1>
        <form method="POST">
            <input type="text" name="produto" placeholder="Digite o produto..." required>
            <button type="submit">BUSCAR</button>
        </form>
    </div>

    {% if query %}
        <h2 style="margin-top: 30px;">Resultados para: {{ query }}</h2>
        <div style="display: flex; gap: 10px;">
            <a href="https://www.google.com/search?q={{ query }}" target="_blank">Ver no Google</a>
        </div>
    {% endif %}
</body>
</html>
