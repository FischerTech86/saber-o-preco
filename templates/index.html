<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Optimo</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a2a6c, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding-top: 100px;
        }

        /* Campo de Entrada (Input) */
        .search-container {
            width: 80%;
            max-width: 600px;
            margin-bottom: 40px;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #00d4ff;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
            text-align: center;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        /* Retângulo da IA Optimo */
        #ai-container {
            width: 80%;
            max-width: 600px;
            min-height: 200px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid #333;
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            transition: 0.3s;
        }

        #ai-container h2 {
            margin-top: 0;
            color: #00d4ff;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        #ai-response {
            font-size: 1rem;
            color: #ccc;
            margin-top: 10px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="userInput" placeholder="O que você quer perguntar para a IA?" onkeydown="perguntarIA(event)">
    </div>

    <div id="ai-container">
        <h2>IA Optimo</h2>
        <div id="ai-response">Aguardando sua pergunta...</div>
    </div>

    <script>
        function perguntarIA(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                const termo = document.getElementById('userInput').value;
                const responseBox = document.getElementById('ai-response');
                
                if (!termo) return;

                // Efeito visual de processamento
                responseBox.innerText = "Pensando...";
                
                // Simulação de resposta da IA
                setTimeout(() => {
                    responseBox.innerText = "IA Optimo: Você perguntou sobre '" + termo + "'. Como sou um protótipo, estou pronta para aprender mais com você!";
                }, 1000);
            }
        }
    </script>

</body>
</html>
