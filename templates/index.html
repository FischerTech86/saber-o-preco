<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTIMO</title>
    <style>
        body {
            margin: 0; min-height: 100vh; display: flex; justify-content: center; align-items: center;
            background-color: #000000;
            background-image: radial-gradient(circle at 100% 50%, transparent 20%, #ffffff 21%, #ffffff 34%, transparent 35%, transparent),
                              radial-gradient(circle at 0% 50%, transparent 20%, #1e3a8a 21%, #1e3a8a 34%, transparent 35%, transparent),
                              radial-gradient(circle at 50% 0%, transparent 20%, #000000 21%, #000000 34%, transparent 35%, transparent),
                              radial-gradient(circle at 50% 100%, transparent 20%, #3b82f6 21%, #3b82f6 34%, transparent 35%, transparent);
            background-size: 80px 80px;
            background-position: 0 0, 0 40px, 40px -40px, -40px 0px;
        }

        .box-central {
            background: #ffffff; padding: 40px; border-radius: 20px; width: 90%;
            max-width: 400px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); z-index: 10;
        }

        h1 { color: #0a192f; text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-busca { background-color: #34A853; }
        .btn-comp { background-color: #4285F4; margin-top: 5px; }
        .resultado { margin-top: 20px; padding: 15px; background: #e2e8f0; border-radius: 8px; font-size: 14px; color: #000; }
    </style>
</head>
<body>
    <div class="box-central">
        <h1>OPTIMO</h1>
        <form method="POST">
            <input type="text" name="produto" placeholder="O que você procura?" required>
            <button type="submit" class="btn-busca">BUSCAR NO SHOPPING</button>
        </form>
        <hr style="margin: 20px 0;">
        <form method="POST">
            <input type="text" name="p1" placeholder="Produto A..." required>
            <input type="text" name="p2" placeholder="Produto B..." required>
            <button type="submit" class="btn-comp">COMPARAR AGORA</button>
        </form>
        {% if comparacao %}
        <div class="resultado">{{ comparacao }}</div>
        {% endif %}
    </div>
</body>
</html>
