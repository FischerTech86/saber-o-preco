<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 40px; 
            background: #000; 
            color: #fff; 
            max-width: 800px; 
            margin: auto; 
        }
        
        /* Estilo para o título animado */
        .animated-title {
            font-size: 3.5rem; /* Bem grande */
            text-align: center;
            color: #60a5fa;
            margin-bottom: 20px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.05); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }

        .card { 
            background: #1a1a1a; 
            border: 1px solid #333; 
            padding: 20px; 
            margin: 20px 0; 
            border-radius: 10px; 
        }
        
        form { text-align: center; margin-bottom: 40px; }
        input { padding: 12px; width: 60%; border-radius: 5px; border: none; font-size: 16px; }
        button { padding: 12px 20px; background: #60a5fa; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; margin-left: 10px;}
        button:hover { background: #3b82f6; }
        
        a { color: #60a5fa; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <h1 class="animated-title">Optimo</h1>
    
    <form action="/" method="GET">
        <input type="text" name="pesquisa" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    <hr style="border: 0; border-top: 1px solid #333; margin: 30px 0;">

    {% if lista %}
        <h2>Resultados para: {{ termo }}</h2>
        {% for item in lista %}
            <div class="card">
                <h3>{{ item.nome }}</h3>
                <p><strong>Diferencial:</strong> {{ item.dif }}</p>
                <a href="{{ item.link }}" target="_blank">Ver no Google Shopping</a>
            </div>
        {% endfor %}
    {% elif termo %}
        <p>Nenhum resultado encontrado para "{{ termo }}".</p>
    {% endif %}

</body>
</html>
