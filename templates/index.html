<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO - Comparador de Preços</title>
    <style>
        body { margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; background-color: #0a192f; color: white; font-family: sans-serif; }
        .menu { margin: 20px; text-align: center; }
        .menu a { color: #60a5fa; margin: 0 10px; text-decoration: none; }
        .box-central { background: #112240; padding: 40px; border-radius: 15px; width: 90%; max-width: 500px; text-align: center; }
    </style>
</head>
<body>
    <nav class="menu">
        <a href="/">Início</a> <a href="/sobre">Sobre</a> <a href="/dicas">Dicas</a> <a href="/politica-privacidade">Privacidade</a>
    </nav>
    <div class="box-central">
        <h1>OPTIMO</h1>
        <p>Compare dois produtos e tome a melhor decisão de compra.</p>
        <form action="/resultado" method="POST">
            <input type="text" name="p1" placeholder="Produto A..." required style="padding: 10px; width: 80%; margin: 5px;">
            <input type="text" name="p2" placeholder="Produto B..." required style="padding: 10px; width: 80%; margin: 5px;">
            <br><button type="submit" style="padding: 10px 20px; margin-top: 10px; cursor: pointer;">COMPARAR</button>
        </form>
        {% if resultado %}
        <div style="margin-top: 20px; padding: 15px; border: 1px solid #60a5fa; border-radius: 10px;">{{ resultado }}</div>
        {% endif %}
    </div>
</body>
</html>
