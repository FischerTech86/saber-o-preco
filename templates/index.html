<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTIMO</title>
    <style>
        :root {
            --azul-escuro: #0a192f;
            --azul-medio: #1e3a8a;
            --azul-claro: #60a5fa;
            --branco: #f8fafc;
        }

        body {
            margin: 0; 
            background-color: var(--azul-escuro);
            font-family: sans-serif; 
            display: flex; 
            justify-content: center;
            align-items: center; 
            min-height: 100vh;
            /* Efeito de Azulejos no Fundo */
            background-image: linear-gradient(45deg, var(--azul-medio) 25%, transparent 25%), 
                              linear-gradient(-45deg, var(--azul-medio) 25%, transparent 25%);
            background-size: 60px 60px;
        }

        /* Esta é a caixa central que você quer manter igual */
        .box-central {
            background: var(--branco);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-shadow: none;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 10;
        }

        h1 { color: var(--azul-escuro); text-align: center; margin-top: 0; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
        .btn-busca { background-color: #34A853; }
        .btn-comp { background-color: #4285F4; margin-top: 5px; }
        .resultado { margin-top: 20px; padding: 15px; background: #e2e8f0; border-radius: 8px; font-size: 14px; }
    </style>
</head>
<body>

    <div class="box-central">
        <h1>OPTIMO</h1>
        
        <form method="POST">
            <input type="text" name="produto" placeholder="O que você procura?" required>
            <button type="submit" class="btn-busca">BUSCAR NO SHOPPING</button>
        </form>

        <hr style="margin: 20px 0;">

        <form method="POST">
            <input type="text" name="p1" placeholder="Produto A..." required>
            <input type="text" name="p2" placeholder="Produto B..." required>
            <button type="submit" class="btn-comp">COMPARAR AGORA</button>
        </form>

        {% if comparacao %}
        <div class="resultado">{{ comparacao }}</div>
        {% endif %}
    </div>

</body>
</html>
