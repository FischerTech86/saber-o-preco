<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding-top: 50px; }
        .box { border: 1px solid #007bff; padding: 20px; width: 400px; }
        input, button { width: 100%; margin-bottom: 10px; padding: 10px; background: #111; color: white; border: 1px solid #333; }
        button { background: #007bff; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Optimo</h1>
    <div class="box">
        <form method="POST">
            <input type="text" name="prod_a" placeholder="Produto A" required>
            <input type="text" name="prod_b" placeholder="Produto B" required>
            <button type="submit">Comparar Produtos</button>
        </form>
    </div>
    {% if analise %}
        <div class="box" style="margin-top: 20px;">
            <p>{{ analise | safe }}</p>
        </div>
    {% endif %}
</body>
</html>
