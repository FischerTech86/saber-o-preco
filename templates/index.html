<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Busca de Produtos</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a2a6c, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .search-container {
            width: 80%;
            max-width: 800px;
            margin-top: 250px;
            transition: 0.5s;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #00d4ff;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            font-size: 1.2rem;
            text-align: center;
            outline: none;
        }

        #results {
            display: none;
            width: 80%;
            max-width: 600px;
            margin-top: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #00d4ff;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(0, 212, 255, 0.2);
            transform: scale(1.02);
        }

        .price { font-weight: bold; color: #00d4ff; font-size: 1.3rem; }
    </style>
</head>
<body>

    <div class="search-container" id="searchBar">
        <input type="text" id="userInput" placeholder="O que você está procurando?" onkeydown="buscar(event)">
    </div>

    <div id="results">
        <!-- Os resultados aparecerão aqui -->
    </div>

    <script>
        // Seus produtos (substitua os links pelo seu link da Cakto)
        const produtos = [
            { nome: "Plano Iniciante", desc: "Acesso básico", preco: "R$ 10,00", link: "LINK_DA_CAKTO_AQUI" },
            { nome: "Plano Econômico", desc: "Melhor custo-benefício", preco: "R$ 29,90", link: "LINK_DA_CAKTO_AQUI" },
            { nome: "Plano Premium", desc: "Acesso total e exclusivo", preco: "R$ 59,90", link: "LINK_DA_CAKTO_AQUI" }
        ];

        function buscar(event) {
            if (event.key === 'Enter') {
                const container = document.getElementById('results');
                document.getElementById('searchBar').style.marginTop = '50px';
                container.innerHTML = ''; // Limpa resultados anteriores
                container.style.display = 'block';

                // Cria os cartões dinamicamente
                produtos.forEach(p => {
                    container.innerHTML += `
                        <a href="${p.link}" class="card">
                            <div>
                                <h3>${p.nome}</h3>
                                <p>${p.desc}</p>
                            </div>
                            <div class="price">${p.preco}</div>
                        </a>
                    `;
                });
            }
        }
    </script>

</body>
</html>
