<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Meu Chatbox</title>
    <style>
        body { font-family: Arial; display: flex; justify-content: center; padding: 20px; }
        #chat-box { width: 400px; border: 1px solid #ccc; padding: 20px; border-radius: 10px; }
        #messages { height: 300px; overflow-y: auto; border-bottom: 1px solid #eee; margin-bottom: 10px; }
        .msg { margin: 10px 0; padding: 8px; border-radius: 5px; }
        .user { background: #e1f5fe; text-align: right; }
        .bot { background: #f5f5f5; }
    </style>
</head>
<body>

<div id="chat-box">
    <div id="messages"></div>
    <input type="text" id="userInput" placeholder="Digite sua mensagem...">
    <button onclick="sendMessage()">Enviar</button>
</div>

<script>
    async function sendMessage() {
        let input = document.getElementById('userInput');
        let msgBox = document.getElementById('messages');
        let text = input.value;
        
        msgBox.innerHTML += `<div class="msg user">Você: ${text}</div>`;
        input.value = "";

        let res = await fetch('/chat', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({message: text})
        });
        let data = await res.json();
        msgBox.innerHTML += `<div class="msg bot">IA: ${data.reply}</div>`;
    }
</script>
</body>
</html>
