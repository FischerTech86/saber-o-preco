<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPTIMO - Inteligência de Compra</title>
    <style>
        :root {
            --primary: #4285F4; --red: #EA4335; --yellow: #FBBC05; --green: #34A853;
        }

        /* Fundo Geométrico Animado */
        body {
            margin: 0; padding: 0; min-height: 100vh;
            background: #0a0f1d;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow-x: hidden;
            display: flex; flex-direction: column; align-items: center;
        }

        .bg-shapes {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1;
            background: radial-gradient(circle at 50% 50%, #16213e 0%, #0a0f1d 100%);
        }

        .shape {
            position: absolute; border-radius: 50%; opacity: 0.4; filter: blur(60px);
            animation: move 20s infinite alternate;
        }
        .s1 { width: 400px; height: 400px; background: var(--primary); top: -100px; left: -100px; }
        .s2 { width: 300px; height: 300px; background: var(--red); bottom: -50px; right: -50px; animation-duration: 15s; }
        .s3 { width: 250px; height: 250px; background: var(--yellow); top: 20%; right: 10%; animation-duration: 25s; }

        @keyframes move { from { transform: translate(0,0); } to { transform: translate(100px, 100px); } }

        /* Título Animado */
        .optimo-title {
            font-size: 80px; font-weight: 900; margin-top: 40px;
            background: linear-gradient(to right, var(--primary), var(--red), var(--yellow), var(--green));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-size: 300% auto;
            animation: gradient-text 4s ease infinite;
            letter-spacing: -2px;
        }

        @keyframes gradient-text {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Box de Busca Profissional */
        .search-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px; border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%; max-width: 600px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center; margin-top: 20px;
        }

        input[type="text"] {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: rgba(255, 255, 255, 0.1); color: white;
            font-size: 18px; margin-bottom: 20px; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }

        input[type="text"]:focus { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px var(--primary); }

        .btn-search {
            width: 100%; padding: 18px; border-radius: 15px; border: none;
            background: var(--green); color: white; font-weight: bold;
            font-size: 18px; cursor: pointer; transition: 0.3s;
        }

        .btn-search:hover { transform: scale(1.02); background: #2d8a46; }

        /* Grade de Resultados Dinâmicos */
        .results-container {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px; width: 90%; max-width: 1000px; margin-top: 40px; padding-bottom: 50px;
        }

        .category-box {
            background: rgba(10, 25, 47, 0.8); padding: 25px; border-radius: 20px;
            border-top: 4px solid var(--primary);
        }

        .category-box h3 { margin-top: 0; color: var(--primary); font-size: 22px; }

        .store-link {
            display: block; padding: 12px; margin: 8px 0;
            background: rgba(255, 255, 255, 0.05); color: #fff;
            text-decoration: none; border-radius: 10px;
            transition: 0.3s; font-size: 15px; font-weight: 500;
        }

        .store-link:hover { background: var(--primary); transform: translateX(10px); }

        .tag-search { font-size: 12px; opacity: 0.6; display: block; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="bg-shapes">
        <div class="shape s1"></div>
        <div class="shape s2"></div>
        <div class="shape s3"></div>
    </div>

    <div class="optimo-title">OPTIMO</div>

    <div class="search-card">
        <form method="POST">
            <input type="text" name="produto" placeholder="O que você quer comprar hoje?" required>
            <button type="submit" class="btn-search">PESQUISAR PREÇOS</button>
        </form>
    </div>

    {% if query %}
    <h2 style="margin-top: 40px;">Resultados para: <span style="color: var(--yellow)">{{ query }}</span></h2>
    <div class="results-container">
        
        <div class="category-box" style="border-color: var(--red);">
            <h3>🛒 Mercados</h3>
            <a href="https://www.carrefour.com.br/busca?termo={{ query }}" target="_blank" class="store-link">Carrefour <span class="tag-search">Buscar "{{ query }}"</span></a>
            <a href="https://www.tendaatacado.com.br/busca?termo={{ query }}" target="_blank" class="store-link">Tenda Atacado</a>
            <a href="https://www.paodeacucar.com/busca?termo={{ query }}" target="_blank" class="store-link">Pão de Açúcar</a>
        </div>

        <div class="category-box" style="border-color: var(--primary);">
