<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        /* [Seu CSS anterior se mantém aqui...] */
        body {
            background: radial-gradient(circle at 50% -50%, #1e3a8a, #000000 65%);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 60px; text-align: center; }
        .animated-title { font-size: 3.5rem; margin-bottom: 30px; font-weight: 800; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }

        .search-container { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; width: 90%; max-width: 600px; }
        input { background: transparent; border: none; color: white; padding: 15px 25px; width: 100%; outline: none; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        .results-area { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 40px; width: 90%; max-width: 800px; }
        .card { background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); width: 200px; text-align: center; }
        .btn-link { display: block; margin-top: 15px; color: #60a5fa; text-decoration: none; font-weight: bold; }

        /* NOVO: Estilo para Dicas e Política */
        .info-section { width: 90%; max-width: 600px; margin-top: 50px; margin-bottom: 50px; }
        .info-card { background: rgba(255, 255, 255, 0.03); padding: 20px; border-radius: 15px; border: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 20px; }
        h4 { margin-top: 0; color: #60a5fa; }
    </style>
</head>
<body>

    <header>
        <h1 class="animated-title">Optimo</h1>
    </header>

    <form method="POST" class="search-container">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    <div class="results-area">
        {% if termo %}
        <div class="card"><h3>Premium</h3><a href="https://www.google.com/search?tbm=shop&q={{ termo }}+caro" target="_blank" class="btn-link">Ver Mais Caro</a></div>
        <div class="card"><h3>Padrão</h3><a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank" class="btn-link">Ver Intermediário</a></div>
        <div class="card"><h3>Econômico</h3><a href="https://www.google.com/search?tbm=shop&q={{ termo }}+barato" target="_blank" class="btn-link">Ver Mais Barato</a></div>
        {% endif %}
    </div>

    <div class="info-section">
        <div class="info-card">
            <h4>💡 Dicas</h4>
            <ul>
                {% for dica in info.dicas %}
                <li>{{ dica }}</li>
                {% endfor %}
            </ul>
        </div>
        <div class="info-card">
            <h4>🛡️ Política</h4>
            <p>{{ info.politica }}</p>
        </div>
    </div>

</body>
</html>
