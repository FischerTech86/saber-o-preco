<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA Optimo Real</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .search-container { width: 80%; max-width: 800px; margin-top: 200px; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 2px solid #00d4ff; background: #111; color: white; text-align: center; font-size: 1.1rem; }
        #ai-btn { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #00d4ff; color: black; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #ai-modal { display: none; position: fixed; bottom: 80px; right: 20px; width: 350px; background: #111; border: 1px solid #00d4ff; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="search-container">
        <input type="text" id="userInput" placeholder="O que você está procurando?" onkeydown="buscar(event)">
    </div>

    <div id="ai-btn" onclick="toggleIA()">IA Optimo</div>
    <div id="ai-modal">
        <input type="text" id="aiInput" placeholder="Pergunte qualquer coisa..." onkeydown="perguntarIA(event)" style="width: 90%; padding: 10px; border-radius: 10px;">
        <div id="ai-resp" style="margin-top:15px; font-size:0.9rem;">IA Optimo: Estou conectada, pode perguntar!</div>
    </div>

    <script>
        // Função de busca original
        function buscar(e) { if(e.key === 'Enter') window.open(`https://www.google.com/search?q=${e.target.value}&tbm=shop`); }

        function toggleIA() {
            const m = document.getElementById('ai-modal');
            m.style.display = m.style.display === 'block' ? 'none' : 'block';
        }

        // Função que realmente conecta na IA (Hugging Face)
        async function perguntarIA(e) {
            if (e.key === 'Enter') {
                const prompt = e.target.value;
                const respDiv = document.getElementById('ai-resp');
                respDiv.innerText = "Pensando...";

                try {
                    // Esta é uma chamada para uma API de IA aberta
                    const response = await fetch("https://api-inference.huggingface.co/models/facebook/blenderbot-400M-distill", {
                        method: "POST",
                        headers: { "Authorization": "Bearer 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", "Content-Type": "application/json" },
                        body: JSON.stringify({ inputs: prompt })
                    });
                    const result = await response.json();
                    respDiv.innerText = "IA Optimo: " + (result.generated_text || "Não consegui processar agora.");
                } catch (err) {
                    respDiv.innerText = "IA Optimo: Erro de conexão, tente novamente.";
                }
            }
        }
    </script>
</body>
</html>
