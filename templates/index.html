<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body {
            /* O gradiente exato da sua imagem */
            background: radial-gradient(circle at 50% 10%, #0a192f, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }

        /* Barra de pesquisa (Pílula) */
        .search-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            width: 100%;
            max-width: 600px;
        }
        input {
            background: transparent;
            border: none;
            color: white;
            padding: 15px 25px;
            width: 100%;
            outline: none;
            font-size: 1rem;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Resultados */
        .result-section { width: 90%; max-width: 700px; margin-top: 50px; }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 15px; 
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .btn-shopping {
            display: inline-block;
            margin-top: 10px;
            color: #60a5fa;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <h1>Optimo</h1>
    </header>

    <form method="POST" class="search-container">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="result-section">
        <h3>Resultados para: {{ termo }}</h3>
        
        <div class="card">
            <h4>{{ termo }} - Opção Premium</h4>
            <p>Melhor qualidade e entrega rápida.</p>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank" class="btn-shopping">Ver no Google Shopping</a>
        </div>

        <div class="card">
            <h4>{{ termo }} - Opção Econômica</h4>
            <p>Melhor custo-benefício.</p>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank" class="btn-shopping">Ver no Google Shopping</a>
        </div>
    </div>
    {% endif %}

</body>
</html>
