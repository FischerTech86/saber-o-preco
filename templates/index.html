<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #2c3e50; color: white; padding: 50px 20px; }
        .grid-app { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; max-width: 500px; margin: 40px auto; }
        .app-icon { background: white; padding: 30px 10px; border-radius: 12px; text-decoration: none; color: #2c3e50; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Optimo</h1>
    <div class="grid-app">
        {% for app in apps %}
        <a href="{{ app.link }}" class="app-icon">{{ app.nome }}</a>
        {% endfor %}
    </div>
</body>
</html>
