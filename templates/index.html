{% for item in lista %}
    <div style="border: 1px solid #ccc; padding: 15px; margin: 10px 0; border-radius: 8px;">
        <h3>{{ item.nome }}</h3>
        <p><strong>Diferencial:</strong> {{ item.dif }}</p>
        <a href="{{ item.link }}" target="_blank" style="text-decoration: none; color: #007bff; font-weight: bold;">Ver no Google Shopping</a>
    </div>
{% endfor %}
