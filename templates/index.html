<!DOCTYPE html>
<html>
<body>
    <h1>Saber o Preço </h1>
    <form action="/" method="POST">
        <input type="text" name="produto" placeholder="Digite o produto..." required>
        <button type="submit">Buscar</button>
    </form>
    
    <hr>
    
    {% if link %}
        <h2>Resultados para: {{ termo }}</h2>
        <div style="padding: 20px; border: 2px solid #3483fa; border-radius: 10px;">
            <p>Clique no botão abaixo para ver todos os preços atualizados no Mercado Livre:</p>
            <a href="{{ link }}" target="_blank" style="padding: 10px 20px; background-color: #3483fa; color: white; text-decoration: none; border-radius: 5px;">
                Ver preços no Mercado Livre
            </a>
        </div>
    {% endif %}
</body>
</html>
