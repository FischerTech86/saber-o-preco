<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo - IA de Compras</title>
    <style>
        body { margin: 0; background: url('{{ url_for("static", filename="fundo.jpg") }}') no-repeat center center fixed; background-size: cover; color: white; font-family: sans-serif; }
        .overlay { background: rgba(0,0,0,0.7); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .header { display: flex; align-items: center; gap: 15px; margin-top: 50px; }
        .site-logo { width: 60px; }
        .optimo-title { font-size: 50px; font-weight: bold; background: linear-gradient(to right, #4285F4, #EA4335); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .search-container { width: 90%; max-width: 600px; margin-top: 40px; }
        .box { background: #111d35; padding: 20px; border-radius: 15px; margin-bottom: 20px; text-align: center; }
        input { padding: 15px; width: 70%; border-radius: 10px; border: none; }
        .btn { padding: 15px 20px; background: #28a745; color: white; border: none; border-radius: 10px; cursor: pointer; }
        .btn-loja { display: inline-block; padding: 10px; margin: 5px; background: #1e40af; color: white; text-decoration: none; border-radius: 5px; }
    </style>
</head>
<body>
<div class="overlay">
    <div class="header">
        <img src="{{ url_for('static', filename='logo.png') }}" class="site-logo">
        <div class="optimo-title">OPTIMO</div>
    </div>

    <div class="search-container">
        <div class="box">
            <form method="POST">
                <input type="text" name="pergunta_ia" placeholder="Pergunte algo à IA Optimo...">
                <button type="submit" class="btn">Enviar</button>
            </form>
        </div>
        <div class="box">
            <form method="POST">
                <input type="text" name="produto" placeholder="Buscar produto...">
                <button type="submit" class="btn">Buscar</button>
            </form>
        </div>
    </div>

    {% if res %}
        {% if res.ia_resposta %}<div class="box">{{ res.ia_resposta }}</div>{% endif %}
        {% for cat in ['mercados', 'lojas', 'carros', 'relogios'] %}
            {% if res[cat] %}
            <div class="box">
                <h3>{{ cat.capitalize() }}</h3>
                {% for item in res[cat] %}<a href="{{ item.link }}" target="_blank" class="btn-loja">{{ item.nome }}</a>{% endfor %}
            </div>
            {% endif %}
        {% endfor %}
    {% endif %}
</div>
</body>
</html>
