<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { margin: 0; background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* Luzes de fundo */
        .light-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; overflow: hidden; }
        .light-blob { position: absolute; border-radius: 50%; filter: blur(120px); opacity: 0.5; }
        .blob-1 { width: 600px; height: 600px; background: #001f3f; top: -100px; left: -100px; }
        .blob-2 { width: 800px; height: 800px; background: #0074D9; bottom: -200px; right: -200px; }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; color: #fff; text-shadow: 0 0 20px #0074D9; }

        .search-form { background: rgba(255, 255, 255, 0.05); padding: 10px; border-radius: 50px; border: 1px solid rgba(255, 255, 255, 0.1); display: flex; width: 90%; max-width: 500px; }
        input { background: transparent; border: none; color: white; padding: 15px 20px; width: 100%; outline: none; }
        button { background: #0074D9; border: none; padding: 10px 25px; border-radius: 50px; color: white; cursor: pointer; }

        /* Grid de 3 colunas */
        .results-grid { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 40px; 
            width: 90%; 
            max-width: 1000px; 
        }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 300px;
            text-align: center;
        }

        .product-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 10px; }
        .btn-link { display: block; margin-top: 10px; color: #60a5fa; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="light-container">
        <div class="light-blob blob-1"></div>
        <div class="light-blob blob-2"></div>
    </div>

    <header><h1>Optimo</h1></header>

    <form method="POST" class="search-form">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="results-grid">
        
        <!-- Esquerda: Mais Barato -->
        <div class="card">
            <h3>Mais Barato</h3>
            <img src="https://image.pollinations.ai/prompt/simple cheap {{ termo }}" class="product-img">
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:p" target="_blank" class="btn-link">Ver Ofertas</a>
        </div>

        <!-- Meio: Mais Econômico (Custo-Benefício) -->
        <div class="card">
            <h3>Econômico</h3>
            <img src="https://image.pollinations.ai/prompt/value for money {{ termo }}" class="product-img">
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank" class="btn-link">Ver Ofertas</a>
        </div>

        <!-- Direita: Mais Caro -->
        <div class="card">
            <h3>Mais Caro</h3>
            <img src="https://image.pollinations.ai/prompt/luxury high end {{ termo }}" class="product-img">
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:pd" target="_blank" class="btn-link">Ver Ofertas</a>
        </div>

    </div>
    {% endif %}

</body>
</html>
