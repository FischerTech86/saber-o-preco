<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body {
            /* Fundo preto com luz azul focada no topo */
            background: radial-gradient(circle at 50% -50%, #1e3a8a, #000000 65%);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header { margin-top: 60px; text-align: center; }

        /* Animação do nome */
        .animated-title {
            font-size: 3.5rem;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: -2px;
            animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite;
        }

        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        @keyframes glow { 0% { text-shadow: 0 0 10px rgba(37, 99, 235, 0.3); } 50% { text-shadow: 0 0 25px rgba(37, 99, 235, 0.6); } 100% { text-shadow: 0 0 10px rgba(37, 99, 235, 0.3); } }

        /* Barra de pesquisa */
        .search-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 10px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            width: 90%;
            max-width: 600px;
        }
        input { background: transparent; border: none; color: white; padding: 15px 25px; width: 100%; outline: none; font-size: 1rem; }
        button { background: #2563eb; color: white; border: none; padding: 15px 30px; border-radius: 50px; cursor: pointer; font-weight: bold; }

        /* Área dos Cards */
        .results-area { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 20px; 
            margin-top: 40px; 
            width: 90%; 
            max-width: 800px; 
        }
        .card { 
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 200px;
            text-align: center;
        }
        .btn-link { 
            display: block; margin-top: 15px; color: #60a5fa; text-decoration: none; font-weight: bold; font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="animated-title">Optimo</h1>
    </header>

    <form method="POST" class="search-container">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="results-area">
        <div class="card">
            <h3>Premium</h3>
            <p>Opções de alta gama</p>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }} (caro)" target="_blank" class="btn-link">Ver Mais Caro</a>
        </div>
        <div class="card">
            <h3>Padrão</h3>
            <p>Custo-benefício</p>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" target="_blank" class="btn-link">Ver Intermediário</a>
        </div>
        <div class="card">
            <h3>Econômico</h3>
            <p>Melhores ofertas</p>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }} (barato)" target="_blank" class="btn-link">Ver Mais Barato</a>
        </div>
    </div>
    {% endif %}

</body>
</html>
