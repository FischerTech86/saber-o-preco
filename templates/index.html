<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO - Busca</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; text-align: center; padding-top: 50px; }
        .box { background-color: #112240; padding: 30px; display: inline-block; border-radius: 15px; border: 1px solid #60a5fa; }
        input { padding: 12px; margin: 10px; width: 300px; border-radius: 5px; border: none; }
        button { padding: 12px 25px; background-color: #60a5fa; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <h1>OPTIMO</h1>
    <div class="box">
        <form action="/resultado" method="GET">
            <input type="text" name="produto1" placeholder="Nome do primeiro produto" required><br>
            <input type="text" name="produto2" placeholder="Nome do segundo produto" required><br>
            <button type="submit">COMPARAR PRODUTOS</button>
        </form>
    </div>
</body>
</html>
