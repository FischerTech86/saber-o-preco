<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        body { background: #0a111a; color: #fff; font-family: sans-serif; padding: 20px; }
        .grid-comparacao { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        
        /* Estilo das Colunas */
        .card { padding: 20px; border-radius: 10px; border: 2px solid; }
        .card-a { border-color: #ff4d4d; background: #1a0a0a; } /* Vermelho A */
        .card-b { border-color: #4d94ff; background: #0a0a1a; } /* Azul B */
        
        .analise-box { margin-top: 30px; padding: 20px; background: #161b22; border-left: 5px solid #60a5fa; color: #ccc; }
        input { width: 90%; padding: 10px; margin-bottom: 10px; background: #222; border: 1px solid #444; color: white; }
        button { width: 100%; padding: 15px; background: #60a5fa; border: none; cursor: pointer; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: auto;">
        <h1>Optimo Comparador</h1>
        <form method="POST">
            <div class="grid-comparacao">
                <input type="text" name="prodA" placeholder="Produto A (Ex: Galaxy S23 Ultra)" required>
                <input type="text" name="prodB" placeholder="Produto B (Ex: iPhone 15 Pro)" required>
            </div>
            <button type="submit">Comparar Fichas Técnicas</button>
        </form>

        {% if dados_a %}
        <div class="grid-comparacao">
            <div class="card card-a">
                <h3>Produto A</h3>
                <ul>{% for key, val in dados_a.items() %}<li><b>{{key}}:</b> {{val}}</li>{% endfor %}</ul>
            </div>
            <div class="card card-b">
                <h3>Produto B</h3>
                <ul>{% for key, val in dados_b.items() %}<li><b>{{key}}:</b> {{val}}</li>{% endfor %}</ul>
            </div>
        </div>
        <div class="analise-box">
            <h3>Análise Técnica</h3>
            <p>{{ analise }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
