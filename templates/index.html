<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background-image: radial-gradient(circle at top right, #001f3f, #000);
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }

        .search-form { 
            background: #111; padding: 10px 20px; border-radius: 50px; 
            border: 1px solid #333; display: flex; width: 400px; margin-bottom: 60px; 
        }
        input { background: transparent; border: none; color: white; width: 100%; padding: 10px; outline: none; }
        button { background: #007bff; border: none; padding: 10px 20px; border-radius: 50px; color: white; cursor: pointer; }

        .results-grid { display: flex; gap: 30px; justify-content: center; width: 90%; max-width: 1000px; }

        /* Design do Card Melhorado */
        .card { 
            background: rgba(255, 255, 255, 0.03); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 30px; border-radius: 20px; 
            width: 300px; 
            display: flex; flex-direction: column; justify-content: space-between;
            transition: transform 0.3s ease;
        }
        .card:hover { border-color: #007bff; }

        .product-img { width: 100%; height: 160px; object-fit: cover; border-radius: 12px; margin-bottom: 20px; }

        /* Estilo do Badge (O que melhora a parte que você marcou) */
        .badge { 
            display: inline-block; background: rgba(0, 123, 255, 0.2); 
            color: #60a5fa; padding: 4px 12px; border-radius: 20px; 
            font-size: 0.75rem; font-weight: bold; margin-bottom: 10px; text-transform: uppercase;
        }

        .ficha-tecnica { font-size: 0.9rem; color: #aaa; margin-bottom: 25px; line-height: 1.6; }
        
        .btn-ofertas { 
            display: block; text-align: center; padding: 12px; 
            background: #007bff; color: #fff; text-decoration: none; border-radius: 10px;
            font-weight: bold; transition: background 0.3s;
        }
        .btn-ofertas:hover { background: #0056b3; }
    </style>
</head>
<body>

    <header><h1>Optimo</h1></header>

    <form method="POST" class="search-form">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="results-grid">
        <!-- Card 1 -->
        <div class="card">
            <h3>Mais Barato</h3>
            <span class="badge">Econômico</span>
            <div class="ficha-tecnica">
                <p>Opção de entrada para quem busca economizar no básico.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:p" class="btn-ofertas">Ver Ofertas</a>
        </div>

        <!-- Card 2 -->
        <div class="card">
            <h3>Econômico</h3>
            <span class="badge">Custo-Benefício</span>
            <img src="https://image.pollinations.ai/prompt/{{ termo }}" class="product-img">
            <div class="ficha-tecnica">
                <p>O melhor equilíbrio entre qualidade e preço.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" class="btn-ofertas">Ver Ofertas</a>
        </div>

        <!-- Card 3 -->
        <div class="card">
            <h3>Mais Caro</h3>
            <span class="badge">Premium</span>
            <div class="ficha-tecnica">
                <p>Linha de alto padrão com durabilidade superior.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:pd" class="btn-ofertas">Ver Ofertas</a>
        </div>
    </div>
    {% endif %}

</body>
</html>
