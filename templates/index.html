<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca e IA Optimo</title>
    <style>
        body { margin: 0; background: radial-gradient(circle at top, #1a2a6c, #000000); background-attachment: fixed; color: white; font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .search-container { width: 80%; max-width: 800px; margin-top: 250px; transition: all 0.5s ease; }
        input { width: 100%; padding: 20px; border-radius: 50px; border: 2px solid #00d4ff; background: rgba(0, 0, 0, 0.6); color: white; outline: none; text-align: center; font-size: 1.1rem; box-sizing: border-box; }
        #results { display: none; width: 80%; max-width: 600px; margin-top: 40px; opacity: 0; transition: opacity 0.5s ease; }
        .card { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; padding: 25px; margin-bottom: 20px; border-radius: 15px; display: flex; justify-content: space-between; align-items: center; text-decoration: none; color: white; transition: 0.3s; }
        .card:hover { background: rgba(0, 212, 255, 0.1); border-color: #00d4ff; }
        #ai-btn { position: fixed; bottom: 20px; right: 20px; padding: 15px 25px; background: #00d4ff; color: black; border-radius: 30px; cursor: pointer; font-weight: bold; }
        #ai-modal { display: none; position: fixed; bottom: 80px; right: 20px; width: 320px; background: #111; border: 1px solid #00d4ff; padding: 20px; border-radius: 15px; box-shadow: 0 0 15px rgba(0, 212, 255, 0.3); }
    </style>
</head>
<body>

    <div class="search-container" id="searchBar">
        <input type="text" id="userInput" placeholder="O que você está procurando?" onkeydown="verificarEnter(event)">
    </div>

    <div id="results">
        <a id="linkBaixo" href="#" target="_blank" class="card"><h3>Preço Baixo</h3></a>
        <a id="linkAlto" href="#" target="_blank" class="card"><h3>Preço Alto</h3></a>
    </div>

    <div id="ai-btn" onclick="toggleIA()">IA Optimo</div>
    <div id="ai-modal">
        <input type="text" id="aiInput" placeholder="Pergunte algo..." onkeydown="perguntarIA(event)" style="width: 90%; margin-bottom: 10px; padding: 10px; border-radius: 10px; border: none;">
        <div id="ai-resp" style="font-size:0.9rem; color: #fff;">IA Optimo: Olá! Em que posso te ajudar hoje?</div>
    </div>

    <script>
        const baseConhecimento = {
            "arroz": ["IA Optimo: O arroz branco é o clássico, mas se quer economia, compare as marcas nas promoções de atacado!", "IA Optimo: O arroz integral é uma escolha mais nutritiva para o dia a dia."],
            "feijão": ["IA Optimo: O feijão carioca é o rei das mesas, fácil de achar e com ótimo preço.", "IA Optimo: Dica: deixe o feijão de molho antes de cozinhar para economizar gás!"],
            "farofa": ["IA Optimo: Farofa combina com quase tudo! Procure pelas versões crocantes que duram mais na despensa.", "IA Optimo: Fazer sua própria farofa com manteiga e temperos frescos sempre sai mais barato."],
            "oi": ["IA Optimo: Olá! Como posso te ajudar a encontrar os melhores preços hoje?", "IA Optimo: Oi! Estou aqui pronta para analisar o mercado para você."],
            // Resposta padrão caso não encontre o produto
            "padrao": ["IA Optimo: Essa é uma pergunta interessante! Recomendo pesquisar no Shopping para ver a variação de preços atual.", "IA Optimo: Não tenho dados específicos desse item agora, mas compare sempre o preço por quilo/litro!"]
        };

        function perguntarIA(event) {
            if (event.key === 'Enter') {
                const input = document.getElementById('aiInput').value.toLowerCase();
                const resp = document.getElementById('ai-resp');
                resp.innerText = "Pensando...";
                
                setTimeout(() => {
                    let encontrado = false;
                    for (let chave in baseConhecimento) {
                        if (input.includes(chave) && chave !== "padrao") {
                            const lista = baseConhecimento[chave];
                            resp.innerText = lista[Math.floor(Math.random() * lista.length)];
                            encontrado = true;
                            break;
                        }
                    }
                    // Se não encontrou, usa uma das respostas padrão
                    if (!encontrado) {
                        const padrao = baseConhecimento["padrao"];
                        resp.innerText = padrao[Math.floor(Math.random() * padrao.length)];
                    }
                }, 800);
            }
        }

        function toggleIA() {
            const modal = document.getElementById('ai-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function verificarEnter(event) {
            if (event.key === 'Enter') {
                const termo = document.getElementById('userInput').value;
                if (!termo) return;
                const encoded = encodeURIComponent(termo);
                document.getElementById('linkBaixo').href = `https://www.google.com/search?q=${encoded}&tbm=shop&tbs=p_ord:p,mr:1`;
                document.getElementById('linkAlto').href = `https://www.google.com/search?udm=28&q=${encoded}&shoprs=CAEYFyoPZ29vZ2xlIHNob3BwaW5nMikIFxIdUHJlw6dvOiBkbyBtYWlvciBwYXJhIG8gbWVub3IqBBABGAFQAmACiAEC`;
                document.getElementById('results').style.display = 'block';
                setTimeout(() => { document.getElementById('results').style.opacity = '1'; }, 50);
                document.getElementById('searchBar').style.marginTop = '50px';
            }
        }
    </script>
</body>
</html>
