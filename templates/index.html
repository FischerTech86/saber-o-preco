<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            margin: 0; height: 100vh; display: flex; justify-content: center; align-items: center;
            /* Usando url_for para garantir que o Flask encontre a imagem */
            background: url("{{ url_for('static', filename='fundo.jpg') }}") no-repeat center center fixed; 
            background-size: cover; font-family: sans-serif; 
        }
        .box { 
            background: rgba(17, 29, 53, 0.95); padding: 40px; border-radius: 20px; 
            text-align: center; width: 350px; border: 2px solid #1e3a8a; 
        }
        .logo { width: 80px; margin-bottom: 10px; }
        .titulo { font-size: 40px; font-weight: bold; color: #4285F4; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #ccc; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <div class="titulo">OPTIMO</div>
        <form method="POST">
            <input type="text" name="produto" placeholder="Digite: carro, relogio ou mercado">
            <button type="submit">Buscar Produto</button>
        </form>
    </div>
</body>
</html>
