<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        /* Fundo com luzes (Gradiente Radial) */
        body { 
            font-family: 'Segoe UI', sans-serif; 
            padding: 40px; 
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%),
                        radial-gradient(circle at 80% 80%, #1e40af, transparent 40%),
                        #000;
            background-attachment: fixed;
            color: #fff; 
        }
        
        .container { max-width: 800px; margin: auto; }

        /* Título animado */
        .animated-title {
            font-size: 4rem;
            text-align: center;
            color: #fff;
            text-shadow: 0 0 20px #60a5fa, 0 0 40px #60a5fa;
            margin-bottom: 20px;
            animation: pulse 3s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        /* Cartões com efeito "Vidro" (Glassmorphism) */
        .card { 
            background: rgba(255, 255, 255, 0.1); 
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2); 
            padding: 25px; 
            margin: 20px 0; 
            border-radius: 15px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }
        
        form { text-align: center; margin-bottom: 40px; }
        input { padding: 15px; width: 60%; border-radius: 50px; border: none; font-size: 16px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }
        button { padding: 15px 30px; background: #60a5fa; color: white; border: none; border-radius: 50px; cursor: pointer; font-size: 16px; margin-left: 10px; font-weight: bold; }
        button:hover { background: #3b82f6; box-shadow: 0 0 15px #3b82f6; }
        
        a { color: #93c5fd; text-decoration: none; font-weight: bold; }
        a:hover { text-decoration: underline; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <h1 class="animated-title">Optimo</h1>
        
        <form action="/" method="GET">
            <input type="text" name="pesquisa" placeholder="O que você procura?" required>
            <button type="submit">Buscar</button>
        </form>

        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin: 30px 0;">

        {% if lista %}
            <h2>Resultados para: {{ termo }}</h2>
            {% for item in lista %}
                <div class="card">
                    <h3>{{ item.nome }}</h3>
                    <p><strong>Diferencial:</strong> {{ item.dif }}</p>
                    <a href="{{ item.link }}" target="_blank">Ver no Google Shopping</a>
                </div>
            {% endfor %}
        {% elif termo %}
            <p style="text-align: center;">Nenhum resultado encontrado para "{{ termo }}".</p>
        {% endif %}
    </div>

</body>
</html>
