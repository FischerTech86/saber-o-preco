<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Optimo</title>
    <style>
        body { 
            margin: 0; background: #000; color: #fff; 
            font-family: 'Segoe UI', sans-serif; 
            display: flex; flex-direction: column; align-items: center; 
            min-height: 100vh; background-image: radial-gradient(circle at top right, #001f3f, #000);
        }

        header { margin-top: 50px; text-align: center; }
        h1 { font-size: 3rem; margin-bottom: 30px; }

        .search-form { 
            background: #111; padding: 10px 20px; border-radius: 50px; 
            border: 1px solid #333; display: flex; width: 400px; margin-bottom: 60px; 
        }
        input { background: transparent; border: none; color: white; width: 100%; padding: 10px; outline: none; }
        button { background: #007bff; border: none; padding: 10px 20px; border-radius: 50px; color: white; cursor: pointer; }

        .results-grid { display: flex; gap: 20px; justify-content: center; width: 90%; max-width: 1000px; }

        .card { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px; border-radius: 15px; 
            width: 300px; height: 400px;
            display: flex; flex-direction: column; justify-content: space-between;
        }

        .product-img { width: 100%; height: 150px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; }

        .ficha-tecnica { font-size: 0.9rem; color: #aaa; margin-bottom: 20px; }
        .ficha-tecnica strong { color: #007bff; }

        .btn-ofertas { 
            display: block; text-align: center; padding: 10px; 
            border: 1px solid #007bff; color: #fff; text-decoration: none; border-radius: 10px;
        }
    </style>
</head>
<body>

    <header><h1>Optimo</h1></header>

    <form method="POST" class="search-form">
        <input type="text" name="query" placeholder="O que você procura?" required>
        <button type="submit">Buscar</button>
    </form>

    {% if termo %}
    <div class="results-grid">
        <!-- Esquerda -->
        <div class="card">
            <h3>Mais Barato</h3>
            <div class="ficha-tecnica">
                <p><strong>Status:</strong> Opção de entrada</p>
                <p><strong>Custo:</strong> O menor valor do mercado.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:p" class="btn-ofertas">Ver Ofertas</a>
        </div>

        <!-- Meio -->
        <div class="card">
            <h3>Econômico</h3>
            <img src="https://image.pollinations.ai/prompt/{{ termo }}" class="product-img">
            <div class="ficha-tecnica">
                <p><strong>Status:</strong> Melhor custo-benefício.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}" class="btn-ofertas">Ver Ofertas</a>
        </div>

        <!-- Direita -->
        <div class="card">
            <h3>Mais Caro</h3>
            <div class="ficha-tecnica">
                <p><strong>Status:</strong> Linha Premium</p>
                <p><strong>Qualidade:</strong> Superior e durável.</p>
                <p><strong>Categoria:</strong> Alto padrão.</p>
            </div>
            <a href="https://www.google.com/search?tbm=shop&q={{ termo }}&tbs=p_ord:pd" class="btn-ofertas">Ver Ofertas</a>
        </div>
    </div>
    {% endif %}

</body>
</html>
