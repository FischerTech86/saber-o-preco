<!DOCTYPE html>
<html lang="pt-br">
<head>
    <style>
        body { background: #0a111a; color: #fff; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .grid-comp { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { padding: 20px; border-radius: 12px; border: 1px solid #333; background: #161b22; }
        .card h3 { color: #60a5fa; border-bottom: 1px solid #333; padding-bottom: 10px; }
        ul { list-style: none; padding: 0; }
        li { padding: 8px 0; border-bottom: 1px solid #222; }
        input { width: 95%; padding: 12px; margin-bottom: 10px; background: #0d1117; border: 1px solid #333; color: white; border-radius: 6px; }
        button { width: 100%; padding: 15px; background: #60a5fa; border: none; cursor: pointer; color: white; font-weight: bold; border-radius: 6px; }
    </style>
</head>
<body>
    <div style="max-width: 900px; margin: auto;">
        <h1 style="text-align: center;">Optimo Comparador</h1>
        <form method="POST">
            <div class="grid-comp">
                <input type="text" name="prodA" placeholder="Produto A (Ex: iPhone 15 Pro)" required>
                <input type="text" name="prodB" placeholder="Produto B (Ex: Galaxy S23 Ultra)" required>
            </div>
            <button type="submit">Gerar Ficha Técnica Comparativa</button>
        </form>

        {% if dados_a %}
        <div class="grid-comp">
            <div class="card">
                <h3>{{ nome_a }}</h3>
                <ul>{% for k, v in dados_a.items() %}<li><b>{{k}}:</b> {{v}}</li>{% endfor %}</ul>
            </div>
            <div class="card">
                <h3>{{ nome_b }}</h3>
                <ul>{% for k, v in dados_b.items() %}<li><b>{{k}}:</b> {{v}}</li>{% endfor %}</ul>
            </div>
        </div>
        {% endif %}
    </div>
</body>
</html>
