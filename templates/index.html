<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca de Produtos</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle at top, #1a2a6c, #000000);
            background-attachment: fixed;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .search-container {
            width: 80%;
            max-width: 800px;
            margin-top: 250px;
            transition: all 0.5s ease;
        }

        input {
            width: 100%;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #00d4ff;
            background: rgba(0, 0, 0, 0.6);
            color: white;
            outline: none;
            text-align: center;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        #results {
            display: none;
            width: 80%;
            max-width: 600px;
            margin-top: 40px;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .card:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: #00d4ff;
        }
    </style>
</head>
<body>

    <div class="search-container" id="searchBar">
        <input type="text" id="userInput" placeholder="O que você está procurando?" onkeydown="verificarEnter(event)">
    </div>

    <div id="results">
        <a id="linkBaixo" href="#" target="_blank" class="card">
            <h3>Preço Baixo</h3>
            <div>Ver no Google Shopping</div>
        </a>
        <a id="linkAlto" href="#" target="_blank" class="card">
            <h3>Preço Alto</h3>
            <div>Ver no Google Shopping</div>
        </a>
    </div>

    <script>
        function verificarEnter(event) {
            if (event.key === 'Enter' || event.keyCode === 13) {
                const termo = document.getElementById('userInput').value;
                if (!termo) return;
                
                const encodedTermo = encodeURIComponent(termo);
                
                // Links configurados para busca direta no Google Shopping
                document.getElementById('linkBaixo').href = `https://www.google.com/search?q=${encodedTermo}&tbm=shop&tbs=p_ord:p,mr:1`;
                document.getElementById('linkAlto').href = `https://www.google.com/search?udm=28&q=${encodedTermo}&shoprs=CAEYFyoPZ29vZ2xlIHNob3BwaW5nMikIFxIdUHJlw6dvOiBkbyBtYWlvciBwYXJhIG8gbWVub3IqBBABGAFQAmACiAEC`;

                const resultsDiv = document.getElementById('results');
                resultsDiv.style.display = 'block';
                setTimeout(() => { resultsDiv.style.opacity = '1'; }, 50);
                document.getElementById('searchBar').style.marginTop = '50px';
            }
        }
    </script>

</body>
</html>
