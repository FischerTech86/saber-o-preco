<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA Optimo - Comparação</title>
    <style>
        /* Aplicando o gradiente azul de fundo para combinar com seu site */
        body { 
            background: radial-gradient(circle at 20% 20%, #1e3a8a, transparent 40%), 
                        radial-gradient(circle at 80% 80%, #1e40af, transparent 40%), 
                        #000; 
            color: #fff; 
            font-family: sans-serif; 
            padding: 40px; 
            margin: 0; 
            min-height: 100vh; 
        }
        .nav-menu { text-align: center; margin-bottom: 30px; }
        .nav-menu a { color: #60a5fa; margin: 0 10px; text-decoration: none; font-weight: bold; }
        
        /* Container centralizado */
        .main-container { display: flex; gap: 20px; justify-content: center; }
        .product-card { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; width: 48%; border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* Área de análise da IA */
        .ai-area { background: rgba(255, 255, 255, 0.1); padding: 20px; border-radius: 15px; margin-top: 20px; border: 1px solid #60a5fa; }
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="/">Início</a>
        <a href="/dicas">Dicas</a>
        <a href="/politica">Política</a>
        <a href="/sobre">Sobre</a>
        <a href="/ia" style="color: #fff; border: 1px solid #60a5fa; padding: 5px 10px; border-radius: 5px;">IA Optimo</a>
    </nav>

    <h1 style="text-align: center;">IA Optimo</h1>

    <div class="main-container">
        <!-- Produto A -->
        <div class="product-card">
            <h3>Produto A</h3>
            <p>Insira as características do Produto A aqui.</p>
        </div>
        <!-- Produto B -->
        <div class="product-card">
            <h3>Produto B</h3>
            <p>Insira as características do Produto B aqui.</p>
        </div>
    </div>

    <!-- Área de Análise da IA -->
    <div class="ai-area">
        <h2>Análise Comparativa</h2>
        <p>Aguardando a comparação dos produtos...</p>
    </div>
</body>
</html>
