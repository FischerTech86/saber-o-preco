<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>IA Optimo</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 40px; margin: 0; }
        .nav-menu { text-align: center; margin-bottom: 40px; }
        .nav-menu a { color: #60a5fa; margin: 0 10px; text-decoration: none; font-weight: bold; }
        .container { max-width: 900px; margin: 0 auto; }
        h1 { text-align: center; color: #60a5fa; }
        .form-area { display: flex; gap: 20px; margin-bottom: 30px; }
        .card { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; flex: 1; }
        input { width: 100%; padding: 10px; margin-top: 10px; border-radius: 5px; border: none; }
        button { width: 100%; padding: 15px; background: #60a5fa; border: none; border-radius: 5px; color: white; font-weight: bold; cursor: pointer; }
        .resultado { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #60a5fa; margin-top: 20px; }
    </style>
</head>
<body>
    <nav class="nav-menu">
        <a href="/">Início</a>
        <a href="/dicas">Dicas</a>
        <a href="/politica">Política</a>
        <a href="/sobre">Sobre</a>
        <a href="/ia">IA Optimo</a>
    </nav>

    <div class="container">
        <h1>IA Optimo</h1>
        <form method="POST" action="/ia">
            <div class="form-area">
                <div class="card">
                    <label>Produto A</label>
                    <input type="text" name="prodA" placeholder="Ex: Samsung S23" required>
                </div>
                <div class="card">
                    <label>Produto B</label>
                    <input type="text" name="prodB" placeholder="Ex: iPhone 15" required>
                </div>
            </div>
            <button type="submit">Comparar Produtos</button>
        </form>

        {% if analise %}
        <div class="resultado">
            <h3>Análise Comparativa</h3>
            <p>{{ analise }}</p>
        </div>
        {% endif %}
    </div>
</body>
</html>
