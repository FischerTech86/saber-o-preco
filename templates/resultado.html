<!DOCTYPE html>
<html>
<head>
    <title>Resultados para {{ termo }}</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .card-produto { background: #1a1a1a; padding: 20px; margin-bottom: 15px; border-radius: 10px; }
        .btn-link { display: inline-block; background: #60a5fa; color: white; padding: 10px 15px; text-decoration: none; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
    <h1>Resultados para: {{ termo }}</h1>
    
    {% for item in lista %}
        <div class="card-produto">
            <h3>{{ item.nome }}</h3>
            <p><strong>Preço:</strong> {{ item.preco }}</p>
            <p><strong>Diferencial:</strong> {{ item.dif }}</p>
            <a href="{{ item.link }}" target="_blank" class="btn-link">Ver no Google Shopping</a>
        </div>
    {% endfor %}
    
    <br>
    <a href="/">← Nova Busca</a>
</body>
</html>
