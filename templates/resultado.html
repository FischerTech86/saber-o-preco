<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>OPTIMO - Comparador</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; padding: 20px; }
        .card { background-color: #112240; padding: 20px; border-radius: 10px; margin-bottom: 20px; border: 1px solid #233554; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: auto; }
        .produto-img { width: 100%; height: 200px; object-fit: contain; background: white; border-radius: 8px; margin-bottom: 10px; }
        .analise-box { background-color: #112240; padding: 20px; border-radius: 10px; border-top: 4px solid #60a5fa; }
        h2 { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Busca Shopping</h2>
        <form action="https://www.google.com/search" method="GET" target="_blank">
            <input type="text" name="q" placeholder="Pesquisar produto...">
            <input type="hidden" name="tbm" value="shop">
            <button type="submit">BUSCAR NO SHOPPING</button>
        </form>
    </div>

    <div class="container">
        <div class="card">
            <h2>Samsung Galaxy S23 Ultra</h2>
            <img src="https://images.samsung.com/galaxy-s23-ultra.jpg" class="produto-img">
            <p><strong>Preço:</strong> R$ 5.999</p>
        </div>
        <div class="card">
            <h2>Apple iPhone 15 Pro</h2>
            <img src="https://store.storeimages.cdn-apple.com/iphone-15-pro.jpg" class="produto-img">
            <p><strong>Preço:</strong> R$ 5.999</p>
        </div>
    </div>

    <div class="analise-box">
        <h2>Análise Comparativa OPTIMO</h2>
        <p>{{ analise }}</p>
    </div>
</body>
</html>
