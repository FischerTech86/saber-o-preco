<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado da Comparação | OPTIMO</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background-color: #112240; padding: 20px; border-radius: 10px; flex: 1; }
        .produto-img { width: 100%; height: 250px; object-fit: contain; background: white; border-radius: 8px; margin-bottom: 15px; }
        .analise-box { background-color: #112240; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 1200px; border-top: 4px solid #60a5fa; }
        h2 { color: #60a5fa; }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h2>Smartphone Samsung Galaxy S23 Ultra</h2>
            <img src="https://images.samsung.com/galaxy-s23-ultra.jpg" class="produto-img">
            <p><strong>Preço:</strong> R$ 5.999</p>
            <p><strong>Specs:</strong> Tela 6.8', Snapdragon 8 Gen 2</p>
        </div>

        <div class="card">
            <h2>Smartphone Apple iPhone 15 Pro</h2>
            <img src="https://store.storeimages.cdn-apple.com/iphone-15-pro.jpg" class="produto-img">
            <p><strong>Preço:</strong> R$ 5.999</p>
            <p><strong>Specs:</strong> Tela 6.1', Chip A17 Pro</p>
        </div>
    </div>

    <div class="analise-box">
        <h2>Análise Comparativa OPTIMO</h2>
        <p>{{ analise }}</p>
    </div>

</body>
</html>
