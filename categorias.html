<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{{ titulo }} - Optimo</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #f4f7f6; padding: 20px; color: #333; }
        .botao { display: block; padding: 15px; margin: 10px auto; background: #2c3e50; color: white; text-decoration: none; border-radius: 6px; max-width: 300px; font-weight: bold; }
        input { padding: 12px; width: 220px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 12px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>{{ titulo }}</h1>
    <form action="{{ request.path }}" method="POST">
        <input type="text" name="produto" placeholder="Buscar produto..." value="{{ termo }}">
        <button type="submit">Pesquisar</button>
    </form>
    
    {% for loja in lojas %}
        <a href="{{ loja.url_final }}" target="_blank" class="botao">{{ loja.nome }}</a>
    {% endfor %}

</body>
</html>
