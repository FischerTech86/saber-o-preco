<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Resultado: {{ nome_a }} vs {{ nome_b }} | OPTIMO</title>
    <style>
        body { background-color: #0a192f; color: white; font-family: sans-serif; padding: 20px; }
        .container { display: flex; gap: 20px; max-width: 1200px; margin: auto; }
        .card { background-color: #112240; padding: 20px; border-radius: 10px; flex: 1; }
        .produto-img { width: 100%; height: 200px; object-fit: contain; background: #fff; border-radius: 8px; margin-bottom: 15px; }
        .analise-box { background-color: #112240; padding: 20px; border-radius: 10px; margin: 20px auto; max-width: 1200px; }
        h2 { color: #60a5fa; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h2>{{ nome_a }}</h2>
            <img src="{{ img_a }}" alt="{{ nome_a }}" class="produto-img">
            <p><strong>Preço:</strong> {{ preco_a }}</p>
            <p>{{ specs_a }}</p>
        </div>

        <div class="card">
            <h2>{{ nome_b }}</h2>
            <img src="{{ img_b }}" alt="{{ nome_b }}" class="produto-img">
            <p><strong>Preço:</strong> {{ preco_b }}</p>
            <p>{{ specs_b }}</p>
        </div>
    </div>

    <div class="analise-box">
        <h2>Análise Comparativa OPTIMO</h2>
        <p>{{ analise }}</p>
    </div>
</body>
</html>
